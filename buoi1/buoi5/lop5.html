        button{
            position: relative;
            padding: 20px;
            border: 4px solid black;
            background-color: white;
             /* qtrong & lon hon thi nam tren */
            z-index: 1;
            overflow: hidden;
        }
        button::before{
            content: "";
            position: absolute;
            left: -100%;
            top: 0;
            width: 100%;
            height: 100%;
            transition: 2s;
            background-color: black;
            z-index: -1;
        }
        button:hover::before{
            left: 0;
        }
        button:hover{
            color: white;
        }
    
    </style>
</head>
<body>
    <!-- <a href="">Home</a> -->
    <button>
        ::before;
        Click me
    </button>
